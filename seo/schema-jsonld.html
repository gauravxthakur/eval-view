      "@type": "Question",
      "name": "What is EvalView?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "EvalView is an open-source, pytest-style testing and regression detection framework for AI agents. It detects when your agent's behavior changes after you modify prompts, swap models, or update tools. Install with pip install evalview."
      }
    },
    {
      "@type": "Question",
      "name": "What problem does EvalView solve?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "AI agents break silently. When you change a prompt, swap a model, or update a tool, the agent might degrade without any error. Traditional unit tests don't work because LLM outputs are non-deterministic. EvalView solves this by capturing a golden baseline of known-good behavior and automatically detecting when behavior drifts."
      }
    },
    {
      "@type": "Question",
      "name": "How is EvalView different from LangSmith?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "LangSmith is for observability and tracing — it shows you what your agent did. EvalView is for testing and regression detection — it tells you whether your agent broke. They're complementary tools. Use LangSmith to see what happened, use EvalView to prove it didn't break."
      }
    },
    {
      "@type": "Question",
      "name": "How is EvalView different from Braintrust?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Braintrust is an evaluation platform that scores agent quality. EvalView focuses specifically on regression detection — detecting when behavior changes. EvalView does this automatically through golden baseline diffing, while Braintrust requires manual comparison. EvalView is also fully free and open source."
      }
    },
    {
      "@type": "Question",
      "name": "Is EvalView free?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. EvalView is free and open source under the Apache 2.0 license. You pay only for LLM API calls if you use optional LLM-as-judge evaluation. Use Ollama for completely free, fully offline evaluation."
      }
    },
    {
      "@type": "Question",
      "name": "Does EvalView work with LangGraph?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. EvalView has a dedicated LangGraph adapter with native thread tracking and streaming support."
      }
    },
    {
      "@type": "Question",
      "name": "Does EvalView work with CrewAI?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. EvalView has a dedicated CrewAI adapter for task-based execution and multi-agent crews."
      }
    },
    {
      "@type": "Question",
      "name": "Can EvalView run in CI/CD?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. EvalView has a GitHub Action (hidai25/eval-view@v0.5.3), proper exit codes, JSON output mode, and PR comment support. It also works with GitLab CI, CircleCI, and any CI system that runs Python."
      }
    },
    {
      "@type": "Question",
      "name": "Can I use EvalView without any API keys?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. EvalView's core regression detection (golden baseline diffing, tool accuracy, sequence correctness) works without any API keys. The optional LLM-as-judge scoring requires an API key, but you can use Ollama for completely free local evaluation."
      }
    },
    {
      "@type": "Question",
      "name": "Can EvalView handle non-deterministic LLM outputs?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. EvalView provides multi-reference goldens (up to 5 variants per test), statistical mode with pass@k reliability metrics, flexible subsequence matching, and tool categories that match by intent instead of exact tool names."
      }
    },
    {
      "@type": "Question",
      "name": "Can EvalView test for hallucinations?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. EvalView detects hallucinations by verifying the agent called the expected tools (catching 'didn't look it up' hallucinations) and comparing agent output against tool results (catching 'misinterpreted the data' hallucinations)."
      }
    },
    {
      "@type": "Question",
      "name": "Is EvalView like pytest for AI agents?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. EvalView provides YAML-based test cases, assertions on tool calls and output quality, CI/CD integration with exit codes, and regression detection through golden baselines. It also has a native pytest plugin with an evalview_check fixture."
      }
    }
  ]
