name: "implement"
description: "Implement group_by_key() from its docstring and type signature in stub.py"

adapter: opencode
adapter_config:
  model: ollama/gemma4:e4b   # swap to ollama/qwen3.5:9b or claude-sonnet-4-6 per run

input:
  query: >
    Implement the group_by_key() function in stub.py. The docstring and type signature
    are already there — the body is just pass. Implement it, then run the __main__ block
    to verify it produces the expected output.
  context:
    cwd: demo/fixtures

expected:
  tools:
    - read_file
    - edit_file
    - bash
  output:
    contains:
      - "implement"
    not_contains:
      - "cannot"
      - "unable"

thresholds:
  min_score: 70
  max_latency: 120000
